# GRPO training config for the perturbation classifier on K=64 quantile tokens.

model:
  grid_size: 64
  d_embed: 32
  d_feat: 64
  hidden_dim: 128

data:
  perturbation_key: "perturbation"
  control_label: "control"
  n_cells_per_pert: 100
  n_cells_ntc: 100
  grid_size: 64
  min_cells: 30
  samples_per_epoch: 1000

rl:
  group_size: 10
  kl_coef: 0.0
  entropy_coef: 0.05
  lr: 3.0e-4
  weight_decay: 0.0
  grad_clip: 1.0

training:
  epochs: 50
  batch_size: 8
  seed: 42

reward:
  profile_type: "delta_mean"

logging:
  print_every: 1
  checkpoint_dir: "checkpoints/rl_perturbation/"
  eval_dir: "eval_results/rl_perturbation/"
  wandb: false
