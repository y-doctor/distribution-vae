model:
  grid_size: 256
  latent_dim: 32
  hidden_dim: 128
  beta: 0.01
  beta_warmup_epochs: 10
  free_bits: 0.0

data:
  perturbation_key: "perturbation"
  min_cells: 20
  gene_subset: null

training:
  epochs: 100
  batch_size: 256
  lr: 1.0e-3
  weight_decay: 1.0e-4
  grad_clip: 1.0
  val_fraction: 0.1
  seed: 42

loss:
  cramer: 1.0
  wasserstein1: 0.0
  kl_divergence: 0.0

logging:
  wandb: false
  wandb_project: "distribution-vae"
  print_every: 10
  checkpoint_dir: "checkpoints/"
