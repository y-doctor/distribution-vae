# Long-run variant of rl_2kg_singles_mlp_pearson_rescale.yaml.
#
# Same reward (Pearson + NTC-baseline hinge with linear rescale above theta)
# and same model/data/RL hparams, just a much larger epoch budget with
# plateau-based early stopping so the run stops when the rolling reward
# actually flattens instead of at an arbitrary epoch.
#
# Stops when the 30-epoch rolling mean of reward hasn't improved by
# >= 0.002 for 50 consecutive epochs. Best checkpoint is still saved on
# every new raw reward high, so the evaluation picks up the peak model
# regardless of where we stop.

model:
  grid_size: 64
  d_embed: 48
  d_feat: 64
  hidden_dim: 256
  n_attn_layers: 0

data:
  perturbation_key: "perturbation"
  control_label: "control"
  n_cells_per_pert: 200
  n_cells_ntc: 200
  grid_size: 64
  min_cells: 30
  samples_per_epoch: 200
  val_fraction: 0.20
  split_seed: 123
  singles_only: true

rl:
  group_size: 64
  kl_coef: 0.0
  entropy_coef: 0.3
  lr: 1.0e-4
  weight_decay: 0.0
  grad_clip: 1.0

training:
  epochs: 600
  batch_size: 8
  seed: 42
  plateau_window: 30
  plateau_patience: 50
  plateau_min_delta: 0.002

reward:
  profile_type: "delta_mean"
  metric: "pearson"
  hinge: "ntc_baseline"
  hinge_quantile: 0.95
  hinge_K: 200
  hinge_multiplier: 1.0
  hinge_rescale: true
  row_normalize: false

logging:
  print_every: 1
  checkpoint_dir: "checkpoints/rl_2kg_singles_mlp_pearson_rescale_long/"
  eval_dir: "eval_results/rl_2kg_singles_mlp_pearson_rescale_long/"
  wandb: false
