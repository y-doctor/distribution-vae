# Reward variant: Pearson + NTC-baseline hinge at 2x NTC noise floor,
# linear rescaling above.
#
# Motivation (see labbook/entries/2026-04-19_*):
# At multiplier=1.0 (the noise floor), many isolated perts have a wide
# "plateau" of 41+ sorta-related perts with reward in [0.21, 0.50] which
# the policy exploits as an easy local optimum instead of learning to
# pick the exact label. Raising the hinge to 2x baseline removes that
# plateau — only genuinely-related perts (r >= 2*theta_i) get nonzero
# reward. Risk: weak-signal perts (BCL2L11, MAP4K3) may now have empty
# reward support and produce dead groups.
#
# Everything else identical to rl_2kg_singles_mlp_pearson_rescale_long.yaml
# for a clean A/B. Plateau-stop budget set slightly higher (patience=60)
# in case learning is slower under sparser reward.

model:
  grid_size: 64
  d_embed: 48
  d_feat: 64
  hidden_dim: 256
  n_attn_layers: 0

data:
  perturbation_key: "perturbation"
  control_label: "control"
  n_cells_per_pert: 200
  n_cells_ntc: 200
  grid_size: 64
  min_cells: 30
  samples_per_epoch: 200
  val_fraction: 0.20
  split_seed: 123
  singles_only: true

rl:
  group_size: 64
  kl_coef: 0.0
  entropy_coef: 0.3
  lr: 1.0e-4
  weight_decay: 0.0
  grad_clip: 1.0

training:
  epochs: 600
  batch_size: 8
  seed: 42
  plateau_window: 30
  plateau_patience: 60
  plateau_min_delta: 0.002

reward:
  profile_type: "delta_mean"
  metric: "pearson"
  hinge: "ntc_baseline"
  hinge_quantile: 0.95
  hinge_K: 200
  hinge_multiplier: 2.0
  hinge_rescale: true
  row_normalize: false

logging:
  print_every: 1
  checkpoint_dir: "checkpoints/rl_2kg_singles_mlp_pearson_rescale_hinge2x/"
  eval_dir: "eval_results/rl_2kg_singles_mlp_pearson_rescale_hinge2x/"
  wandb: false
